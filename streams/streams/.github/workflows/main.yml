name: CI Pipeline - Build, Test and Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:

      # 1. Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Instala Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. BUILD - Compila e instala de forma limpia
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. TEST - Ejecuta los tests (si uno falla, el pipeline se detiene solo)
      - name: Run Tests
        run: mvn test

      # 5. PACKAGE - Genera el archivo .jar
      - name: Package application
        run: mvn package -DskipTests

      # 6. Guarda el .jar como artefacto descargable en GitHub
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-jar
          path: target/*.jar