name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: mvn clean install

      - name: Test
        run: mvn test

      - name: Package
        run: mvn package

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Docker build
        run: docker build -t spring-api .

      - name: Run container
        run: docker run -d -p 8080:8080 spring-api