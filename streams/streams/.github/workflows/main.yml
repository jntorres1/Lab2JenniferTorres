name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: mvn clean install

      - name: Run tests
        run: mvn test

      - name: Package
        run: mvn package

  docker-build-run:
    needs: build-test-package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t spring-api .

      - name: Run container
        run: docker run -d -p 8080:8080 spring-api